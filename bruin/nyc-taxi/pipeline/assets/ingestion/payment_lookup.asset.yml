name: ingestion.payment_lookup
type: bq.seed

parameters:
  path: payment_lookup.csv

columns:
  - name: payment_type_id
    type: integer
    description: Payment type ID
    primary_key: true
    checks:
      - name: not_null
      - name: unique
  - name: payment_type_name
    type: string
    description: Payment type name
    checks:
      - name: not_null
